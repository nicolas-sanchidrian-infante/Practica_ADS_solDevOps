name: DT Provision with Ansible

on:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible pywinrm boto3
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run inventory check
        run: ansible-inventory -i ansible/inventory/aws_inventory.sh --graph

      - name: Run baseline playbook
        run: ansible-playbook -i ansible/inventory/aws_inventory.sh ansible/playbooks/update_inventory.yml
