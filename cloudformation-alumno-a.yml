AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Alumno A - Active Directory en AWS (VPC + subredes + SG + EC2 Windows + Elastic IP)

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR de la VPC
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR subred publica 1
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR subred publica 2
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.11.0/24
    Description: CIDR subred privada 1
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.12.0/24
    Description: CIDR subred privada 2
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: clave-ad
    Description: Nombre del par de claves para RDP
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: Tipo de instancia para el controlador de dominio
  RdpCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR permitido para RDP (recomendado tu IP publica /32)
  LatestWindowsAmi:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base
    Description: AMI mas reciente de Windows Server 2022

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: vpc-practica

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: igw-practica

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: subnet-public-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: subnet-public-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: subnet-private-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: subnet-private-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: rt-public

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: rt-private

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  SecurityGroupWindowsAD:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG para Windows AD
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref RdpCidr
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: !Ref VpcCidr
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 88
          ToPort: 88
          CidrIp: !Ref VpcCidr
        - IpProtocol: udp
          FromPort: 88
          ToPort: 88
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 389
          ToPort: 389
          CidrIp: !Ref VpcCidr
        - IpProtocol: udp
          FromPort: 67
          ToPort: 68
          CidrIp: !Ref VpcCidr
        - IpProtocol: udp
          FromPort: 123
          ToPort: 123
          CidrIp: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: sg-windows-ad

  ADInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestWindowsAmi
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref SecurityGroupWindowsAD
      Tags:
        - Key: Name
          Value: AD-DC01

  ADElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ADElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      EIP: !Ref ADElasticIP
      InstanceId: !Ref ADInstance

Outputs:
  VpcId:
    Description: ID de la VPC
    Value: !Ref VPC
  PublicSubnet1Id:
    Description: ID subred publica 1
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: ID subred publica 2
    Value: !Ref PublicSubnet2
  PrivateSubnet1Id:
    Description: ID subred privada 1
    Value: !Ref PrivateSubnet1
  PrivateSubnet2Id:
    Description: ID subred privada 2
    Value: !Ref PrivateSubnet2
  SecurityGroupId:
    Description: ID del Security Group del AD
    Value: !Ref SecurityGroupWindowsAD
  InstanceId:
    Description: ID de la instancia AD
    Value: !Ref ADInstance
  ElasticIP:
    Description: Elastic IP asignada al AD
    Value: !Ref ADElasticIP
